name: Build and push Docker image to Azure Container Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} \
            --username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/svg-api-anticaidas:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/svg-api-anticaidas:latest
